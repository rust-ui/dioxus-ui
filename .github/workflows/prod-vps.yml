name: Build and Deploy Dioxus SSR App

on:
  # gh workflow run prod-vps.yml
  # gh workflow run prod-vps.yml -f skip_build=true   ← redeploy only, no rebuild
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build and redeploy current :latest image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  build:
    name: Build
    needs: [fmt, typos]
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_build != 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: false
        swap-storage: false

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/dioxus-ui:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest

    env:
      SSH: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${{ secrets.SERVER_IP }}
      SCP: scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

    - name: Copy compose file to server
      run: |
        ${{ env.SSH }} "mkdir -p ~/dioxus-ui"
        ${{ env.SCP }} docker-compose.shared-server.yml root@${{ secrets.SERVER_IP }}:~/dioxus-ui/

    - name: Docker login on server
      run: |
        ${{ env.SSH }} "echo '${{ secrets.DOCKER_PASSWORD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin"

    - name: Deploy app
      run: |
        ${{ env.SSH }} "
          cd ~/dioxus-ui
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          export DOCKER_REPOSITORY=dioxus-ui
          export IMAGE_TAG=latest
          docker compose -f docker-compose.shared-server.yml pull
          docker compose -f docker-compose.shared-server.yml up -d
        "

    - name: Smoke test
      run: |
        sleep 5
        ${{ env.SSH }} "curl -sf http://localhost:5000/ || (docker compose -f ~/dioxus-ui/docker-compose.shared-server.yml logs app --tail=20 && exit 1)"

    - name: Cleanup old Docker images
      run: |
        ${{ env.SSH }} "docker image prune -af"
