[package]
name = "maxime15848/dioxus-ui"
version = "0.1.18"

[dependencies]
"wasmer/static-web-server" = "*"

[fs]
"/public" = "target/dx/dioxus-ui/debug/web/public"

[[command]]
name = "server"
module = "wasmer/static-web-server:webserver"
runner = "https://webc.org/runner/wasi"

[command.annotations.wasi]
# --page-fallback serves index.html for unknown paths (SPA fallback for client-side routing)
# Needed when Dioxus SSG pre-rendered pages are missing, and as a safety net in general
main-args = ["-w", "/public", "--page-fallback", "/public/index.html"]
